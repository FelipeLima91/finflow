<!-- @dsCard group="Components" name="Buttons" subtitle="Variantes: default, secondary, outline, ghost, destructive · tamanhos sm/md/lg" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinFlow — Buttons</title>
<style>
  :root {
    --radius: 0.625rem;
    --background: oklch(0.985 0.002 247.839);
    --foreground: oklch(0.129 0.042 264.695);
    --primary: oklch(0.546 0.215 262.881);
    --primary-foreground: oklch(0.984 0.003 247.858);
    --secondary: oklch(0.968 0.007 247.896);
    --secondary-foreground: oklch(0.208 0.042 265.755);
    --accent: oklch(0.962 0.018 262.5);
    --muted-foreground: oklch(0.554 0.046 257.417);
    --destructive: oklch(0.577 0.245 27.325);
    --border: oklch(0.929 0.013 255.508);
    --shadow-xs: 0 1px 2px 0 oklch(0.13 0.04 264 / 0.05);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 28px;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--background); color: var(--foreground);
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 20px; letter-spacing: -0.02em; margin: 0 0 4px; }
  .sub { color: var(--muted-foreground); font-size: 13px; margin: 0 0 24px; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted-foreground); margin: 22px 0 12px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    height: 36px; padding: 0 16px; border-radius: calc(var(--radius) - 2px);
    font-size: 14px; font-weight: 500; border: 1px solid transparent;
    cursor: pointer; transition: all .15s ease; white-space: nowrap;
  }
  .default { background: var(--primary); color: var(--primary-foreground); box-shadow: var(--shadow-xs); }
  .default:hover { filter: brightness(1.05); }
  .secondary { background: var(--secondary); color: var(--secondary-foreground); box-shadow: var(--shadow-xs); }
  .outline { background: var(--background); color: var(--foreground); border-color: var(--border); box-shadow: var(--shadow-xs); }
  .outline:hover { background: var(--accent); }
  .ghost { background: transparent; color: var(--foreground); }
  .ghost:hover { background: var(--accent); }
  .destructive { background: var(--destructive); color: #fff; box-shadow: var(--shadow-xs); }
  .link { background: transparent; color: var(--primary); text-decoration: underline; text-underline-offset: 4px; }
  .sm { height: 32px; padding: 0 12px; font-size: 13px; }
  .lg { height: 40px; padding: 0 24px; }
  .icon { width: 36px; height: 36px; padding: 0; }
  .disabled { opacity: .5; pointer-events: none; }
</style>
</head>
<body>
  <h1>Buttons</h1>
  <p class="sub">Botão com sombra sutil e leve press (active:scale). Foco em ações claras.</p>

  <h2>Variantes</h2>
  <div class="row">
    <button class="btn default">+ Adicionar</button>
    <button class="btn secondary">Secundário</button>
    <button class="btn outline">Outline</button>
    <button class="btn ghost">Ghost</button>
    <button class="btn destructive">Excluir</button>
    <button class="btn link">Link</button>
  </div>

  <h2>Tamanhos</h2>
  <div class="row">
    <button class="btn default sm">Small</button>
    <button class="btn default">Default</button>
    <button class="btn default lg">Large</button>
    <button class="btn outline icon">◎</button>
  </div>

  <h2>Estados</h2>
  <div class="row">
    <button class="btn default">Ativo</button>
    <button class="btn default disabled">Desabilitado</button>
  </div>
</body>
</html>
