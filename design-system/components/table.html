<!-- @dsCard group="Patterns" name="Transactions table" subtitle="Tabela de movimentações com valores semânticos" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinFlow — Table</title>
<style>
  :root {
    --radius: 0.625rem;
    --background: oklch(0.985 0.002 247.839);
    --card: oklch(1 0 0);
    --foreground: oklch(0.129 0.042 264.695);
    --muted-foreground: oklch(0.554 0.046 257.417);
    --border: oklch(0.929 0.013 255.508);
    --accent: oklch(0.962 0.018 262.5);
    --income: oklch(0.596 0.145 163.225);
    --expense: oklch(0.637 0.237 25.331);
    --shadow-sm: 0 1px 3px 0 oklch(0.13 0.04 264 / 0.06), 0 1px 2px -1px oklch(0.13 0.04 264 / 0.06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 28px;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--background); color: var(--foreground);
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 20px; letter-spacing: -0.02em; margin: 0 0 20px; }
  .wrap { background: var(--card); border: 1px solid var(--border); border-radius: calc(var(--radius) + 4px); box-shadow: var(--shadow-sm); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th { text-align: left; font-size: 12px; font-weight: 500; color: var(--muted-foreground); padding: 12px 16px; border-bottom: 1px solid var(--border); }
  thead th.r, tbody td.r { text-align: right; }
  tbody td { padding: 13px 16px; border-bottom: 1px solid var(--border); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--accent); }
  .desc { font-weight: 500; }
  .cat { color: var(--muted-foreground); }
  .date { color: var(--muted-foreground); white-space: nowrap; }
  .amt { font-weight: 600; font-variant-numeric: tabular-nums; }
  .in { color: var(--income); }
  .out { color: var(--expense); }
</style>
</head>
<body>
  <h1>Transactions table</h1>
  <div class="wrap">
    <table>
      <thead>
        <tr><th>Descrição</th><th>Categoria</th><th>Data</th><th class="r">Valor</th></tr>
      </thead>
      <tbody>
        <tr><td class="desc">Salário</td><td class="cat">Banco</td><td class="date">01/06/2026</td><td class="r amt in">+ R$ 3.500,00</td></tr>
        <tr><td class="desc">Mercado</td><td class="cat">Mercado</td><td class="date">03/06/2026</td><td class="r amt out">− R$ 420,90</td></tr>
        <tr><td class="desc">Aluguel</td><td class="cat">Casa</td><td class="date">05/06/2026</td><td class="r amt out">− R$ 1.800,00</td></tr>
        <tr><td class="desc">Freelance</td><td class="cat">Investimento</td><td class="date">10/06/2026</td><td class="r amt in">+ R$ 950,00</td></tr>
        <tr><td class="desc">Cinema</td><td class="cat">Lazer</td><td class="date">12/06/2026</td><td class="r amt out">− R$ 60,00</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
