<!-- @dsCard group="Components" name="Inputs & form fields" subtitle="Input, select, label e foco com ring azul" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinFlow — Inputs</title>
<style>
  :root {
    --radius: 0.625rem;
    --background: oklch(0.985 0.002 247.839);
    --card: oklch(1 0 0);
    --foreground: oklch(0.129 0.042 264.695);
    --primary: oklch(0.546 0.215 262.881);
    --muted-foreground: oklch(0.554 0.046 257.417);
    --border: oklch(0.929 0.013 255.508);
    --ring: oklch(0.546 0.215 262.881);
    --shadow-xs: 0 1px 2px 0 oklch(0.13 0.04 264 / 0.05);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 28px;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--background); color: var(--foreground);
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 20px; letter-spacing: -0.02em; margin: 0 0 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; max-width: 720px; }
  .field { display: flex; flex-direction: column; gap: 7px; }
  label { font-size: 13px; font-weight: 500; }
  .input, .select {
    height: 36px; width: 100%; padding: 0 12px; font-size: 14px;
    background: var(--card); color: var(--foreground);
    border: 1px solid var(--border); border-radius: calc(var(--radius) - 2px);
    box-shadow: var(--shadow-xs); outline: none; transition: box-shadow .15s, border-color .15s;
  }
  .input::placeholder { color: var(--muted-foreground); }
  .input.focused { border-color: var(--ring); box-shadow: 0 0 0 3px oklch(0.546 0.215 262.881 / 0.5); }
  .hint { font-size: 12px; color: var(--muted-foreground); }
  .select { appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--muted-foreground) 50%), linear-gradient(135deg, var(--muted-foreground) 50%, transparent 50%); background-position: calc(100% - 16px) 15px, calc(100% - 11px) 15px; background-size: 5px 5px; background-repeat: no-repeat; }
</style>
</head>
<body>
  <h1>Inputs & form fields</h1>
  <div class="grid">
    <div class="field">
      <label>Descrição</label>
      <input class="input" placeholder="Ex: Mercado, Luz..." />
    </div>
    <div class="field">
      <label>Valor</label>
      <input class="input" value="R$ 1.200,50" />
    </div>
    <div class="field">
      <label>Tipo</label>
      <select class="select"><option>Saída</option><option>Entrada</option></select>
    </div>
    <div class="field">
      <label>Categoria (foco)</label>
      <input class="input focused" value="Mercado" />
      <span class="hint">Estado de foco com ring azul de 3px.</span>
    </div>
  </div>
</body>
</html>
